name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang libclang-dev python3-dev

      - name: Build (non-Lakka)
        run: cargo build --release

      - name: Rename output for this architecture
        run: cp target/release/liblr_pyxel.so pyxel_libretro-${{ matrix.arch }}.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyxel_libretro-${{ matrix.arch }}
          path: pyxel_libretro-${{ matrix.arch }}.so

  release:
    # Only for real tag pushes — manual test runs (workflow_dispatch)
    # just produce downloadable artifacts above, no actual Release.
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.so
