[package]
name = "lr-pyxel"
version = "0.5.6"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rust-libretro-sys = "0.3.2"
pyo3 = { version = "0.21" }
blip_buf = "0.1"
zip = { version = "8.1", default-features = false, features = ["deflate"] }
pyxel-core = { git = "https://github.com/ShigeakiAsai/pyxel.git", package = "pyxel-core", features = ["sdl2_static"] }
